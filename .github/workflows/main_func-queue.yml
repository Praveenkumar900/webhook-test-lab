name: Test Environments and Gates

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Simulate Build
        run: |
          echo "🔨 Building the Python application..."
          echo "📦 Creating artifacts..."
          echo "Done!"

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build
    environment: Development  # Connects to your 'Development' environment
    steps:
      - name: Simulate Dev Deployment
        run: |
          echo "🚀 Deploying to Development environment..."
          echo "Checking Dev Secrets..."
          # This will show '***' if the secret exists, proving it's working
          echo "Slack URL is: ${{ secrets.SLACK_WEBHOOK_URL }}" 
          echo "✅ Dev Deployment Complete!"

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: Production   # Connects to your 'Production' environment
    steps:
      - name: Simulate Prod Deployment
        run: |
          echo "🚀 Deploying to Production environment..."
          echo "Slack URL is: ${{ secrets.SLACK_WEBHOOK_URL }}"
          echo "✅ Production Deployment Complete!"
